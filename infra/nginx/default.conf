server {
    listen 8443 ssl;
    http2 on;
    server_name gestorapp.labsec.tech;

    #ssl_certificate     /etc/nginx/certs/origin.crt;
    #ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10M;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    #add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob: https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; connect-src 'self' https://static.cloudflareinsights.com; frame-ancestors 'none';" always; 
    add_header X-XSS-Protection "1; mode=block";

    location /api/ {
        proxy_pass http://api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 8443;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Token-Webhook $http_x_token_webhook;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/webhooks/endpoint-itm {
    	client_max_body_size 20m;
    	proxy_request_buffering on;
    	proxy_read_timeout 120s;
    	proxy_connect_timeout 30s;
    	proxy_send_timeout 120s;

    	proxy_set_header Host $host;
    	proxy_set_header X-Real-IP $remote_addr;
    	proxy_set_header X-Forwarded-Proto https;
    	proxy_set_header X-Forwarded-Port 8443;
    	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    	proxy_set_header X-Forwarded-Host $host;
   	    proxy_set_header X-Token-Webhook $http_x_token_webhook;
    	proxy_set_header Authorization $http_authorization;

	    proxy_pass http://api:3001;
    }

    location / {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 8443;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header x-middleware-subrequest "";

    }
}
