services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./storage:/app/apps/api/storage
    secrets:
      - source: app_master_keys_json
        target: app_master_keys.json
      - source: entra_idp_signing_cert_pem
        target: entra_idp_signing_cert.pem

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - api

  nginx:
    image: nginx:stable
    restart: unless-stopped
    depends_on:
      - web
      - api
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro

volumes:
  postgres_data:
  redis_data:

secrets:
  app_master_keys_json:
    file: ./secrets/app_master_keys.json
  entra_idp_signing_cert_pem:
    file: ./secrets/entra_idp_signing_cert.pem
